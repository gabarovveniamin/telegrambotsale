<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Оплата Premium | Sale Sale Sale</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #1c1c1d;
            --tg-theme-text-color: #ffffff;
            --tg-theme-button-color: #2481cc;
            --tg-theme-button-text-color: #ffffff;
            --tg-theme-hint-color: #999999;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        #ton-connect {
            margin-bottom: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 320px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 { font-size: 24px; margin-bottom: 8px; }
        p { color: var(--tg-theme-hint-color); font-size: 14px; margin-bottom: 24px; }

        .price-tag {
            font-size: 32px;
            font-weight: bold;
            color: #0088cc;
            margin: 10px 0;
        }

        #pay-button {
            background-color: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            border-radius: 12px;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            display: none;
            transition: opacity 0.2s;
        }

        #pay-button:disabled { opacity: 0.5; }

        #status {
            margin-top: 15px;
            font-size: 14px;
            min-height: 20px;
        }

        .loader {
            display: none;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #0088cc;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="ton-connect"></div>

    <div class="card">
        <h1>Подписка Premium</h1>
        <p>30 дней доступа к мониторингу</p>
        
        <div class="price-tag" id="price-display">... TON</div>
        
        <button id="pay-button">Подключите кошелек</button>
        <div class="loader" id="loader"></div>
        <div id="status"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const DESTINATION_ADDRESS = "YOUR_WALLET_ADDRESS_HERE"; // We'll replace this
        let amountTon = 0;
        const userId = tg.initDataUnsafe.user?.id;

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://79.76.47.252.nip.io/static/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });

        async function fetchPrice() {
            try {
                const response = await fetch('/tma_api/get-price');
                const data = await response.json();
                amountTon = data.price;
                document.getElementById('price-display').innerText = `${amountTon} TON`;
            } catch (e) {
                console.error("Fetch price error:", e);
                document.getElementById('price-display').innerText = "Ошибка загрузки";
            }
        }

        fetchPrice();

        tonConnectUI.onStatusChange(wallet => {
            const btn = document.getElementById('pay-button');
            if (wallet) {
                btn.style.display = 'block';
                btn.innerText = `Оплатить ${amountTon} TON`;
                btn.onclick = sendTransaction;
            } else {
                btn.style.display = 'none';
            }
        });

        async function sendTransaction() {
            const btn = document.getElementById('pay-button');
            const statusDiv = document.getElementById('status');
            const loader = document.getElementById('loader');

            if (!amountTon || amountTon <= 0) return;

            btn.disabled = true;
            statusDiv.innerText = "Ожидание подтверждения в кошельке...";
            loader.style.display = 'block';

            // Нано-тоны
            const nanoAmount = (amountTon * 1000000000).toString();
            
            // Комментарий (payload) для идентификации пользователя
            const memo = `premium_${userId}`;

            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 600, // 10 minutes
                messages: [
                    {
                        address: DESTINATION_ADDRESS,
                        amount: nanoAmount,
                        payload: btoa(memo) // Base64 memo for internal message
                    }
                ]
            };

            try {
                const result = await tonConnectUI.sendTransaction(transaction);
                statusDiv.innerText = "Транзакция отправлена! Проверяем блокчейн...";
                
                // Отправляем хеш на бэкенд для проверки
                const verifyResponse = await fetch('/tma_api/verify-payment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: userId,
                        boc: result.boc
                    })
                });

                const verifyData = await verifyResponse.json();
                if (verifyData.success) {
                    statusDiv.innerHTML = "<b style='color:#4caf50'>✅ Оплачено! Подписка активирована.</b>";
                    loader.style.display = 'none';
                    setTimeout(() => tg.close(), 3000);
                } else {
                    statusDiv.innerHTML = `<b style='color:#f44336'>❌ Ошибка проверки: ${verifyData.error}</b>`;
                }
            } catch (e) {
                console.error(e);
                statusDiv.innerText = "Оплата отменена или произошла ошибка.";
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
